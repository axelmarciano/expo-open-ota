version: "2"
sql:
  - name: "postgres"
    engine: "postgresql"
    schema: "internal/database/postgres/migrations/"
    queries: "internal/database/postgres/queries/"
    gen:
      go:
        package: "pgdb"
        out: "internal/database/postgres/pgdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
