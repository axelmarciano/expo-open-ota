{{- /*
Optional Secret that renders the structured .Values.apps list into the
JSON format expected by the server's EXPO_APPS_JSON env var. Skipped when
.Values.apps is empty — the chart's default flat-env single-app path
(EXPO_APP_ID + friends) is used instead.

Usage: set values.apps to the same AppConfig structure documented on the
multi-app page, then wire EXPO_APPS_JSON in your deployment to read from
this secret:

  env:
    - name: EXPO_APPS_JSON
      valueFrom:
        secretKeyRef:
          name: {{ include "expo-open-ota.fullname" . }}-apps
          key: apps.json
*/}}
{{- if .Values.apps }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "expo-open-ota.fullname" . }}-apps
  labels:
    {{- include "expo-open-ota.labels" . | nindent 4 }}
type: Opaque
stringData:
  apps.json: |
    {{- toJson .Values.apps | nindent 4 }}
{{- end }}
