# Default values for expo-open-ota.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1 # Do not use more than 1 replica if storageMode is set to local

image:
  repository: ghcr.io/axelmarciano/expo-open-ota
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
    # eks.amazonaws.com/role-arn: "arn:aws:iam::..."
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "expo-open-ota-sa"

secretName: "expo-open-ota-secrets" # If set, environment variables will be read from this secret, else they will be read from the values.yaml file or passed in via the helm command line
storageMode: "s3"
keysStorageType: "aws-secrets-manager"
useCloudfrontRedirect: "false"
useAWSAccessKeys: "false"
cacheMode: "redis"
useDashboard: "false"
useRedisTLS: "false"
# Set to "true" to run the server in multi-app mode — identity, access token
# and signing keys all come from EXPO_APPS_JSON. When "true" the flat-env
# single-app variables (EXPO_APP_ID, EXPO_ACCESS_TOKEN, KEYS_STORAGE_TYPE and
# its per-mode siblings) are not required and will not be rendered.
# See https://github.com/axelmarciano/expo-open-ota/blob/main/apps/docs/docs/advanced/multi-app.mdx
multiApp: "false"

# Structured list of apps for multi-app deployments. When set, the chart
# renders a dedicated Secret ({{ fullname }}-apps) with the JSON payload
# expected by EXPO_APPS_JSON. Leave empty to provide EXPO_APPS_JSON
# yourself via the shared secretName or inline value. Schema matches
# apps/docs/docs/advanced/multi-app.mdx.
#
# apps:
#   - id: "a45ed151-0387-4419-a97c-d008d8f214c7"
#     name: "Production"
#     accessToken: "expo_xxx"
#     keys:
#       mode: "aws-secrets-manager"
#       publicSecretId: "/eoota/prod/public"
#       privateSecretId: "/eoota/prod/private"
apps: []

environment:
  - name: "USE_DASHBOARD"
    key: "useDashboard"
    required: true
    computed: true
  - name: "ADMIN_PASSWORD"
    value: ""
    required:
      - key: "useDashboard"
        is: "true"
  - name: "CACHE_MODE"
    key: "cacheMode"
    required: true
    computed: true
  - name: "REDIS_HOST"
    value: ""
    required:
      - key: "cacheMode"
        is: "redis"
  - name: "REDIS_PORT"
    value: ""
    required:
      - key: "cacheMode"
        is: "redis"
  - name: "REDIS_USE_TLS"
    value: "true"
    required:
      - key: "cacheMode"
        is: "redis"
      - key: "useRedisTLS"
        is: "true"
  - name: "REDIS_PASSWORD"
    value: ""
    required:
      - key: "cacheMode"
        is: "redis"
  - name: "REDIS_USERNAME"
    value: ""
    required: false
  - name: "REDIS_CA_CERT_B64"
    value: ""
    required: false
  - name: "STORAGE_MODE"
    key: "storageMode"
    required: true
    computed: true
  - name: "GCS_BUCKET_NAME"
    value: ""
    required:
      - key: "storageMode"
        is: "gcs"
  - name: "GOOGLE_APPLICATION_CREDENTIALS_B64"
    value: ""
    required:
      - key: "storageMode"
        is: "gcs"
  - name: "AWS_ACCESS_KEY_ID"
    value: ""
    required:
      - key: "useAWSAccessKeys"
        is: "true"
  - name: "AWS_SECRET_ACCESS_KEY"
    value: ""
    required:
      - key: "useAWSAccessKeys"
        is: "true"
  - name: "AWS_REGION"
    value: ""
    required:
      - key: "storageMode"
        is: "s3"
  - name: "AWS_BASE_ENDPOINT"
    value: ""
    required: false
  - name: "S3_BUCKET_NAME"
    value: ""
    required:
      - key: "storageMode"
        is: "s3"
  - name: "BUCKET_KEY_PREFIX"
    value: ""
    required: false
  # TODO: remove S3_KEY_PREFIX once users have migrated to BUCKET_KEY_PREFIX
  - name: "S3_KEY_PREFIX"
    value: ""
    required: false
  - name: "LOCAL_BUCKET_BASE_PATH"
    value: ""
    required:
      - key: "storageMode"
        is: "local"
  - name: "CLOUDFRONT_DOMAIN"
    value: ""
    required:
      - key: "useCloudfrontRedirect"
        is: "true"
  - name: "CLOUDFRONT_KEY_PAIR_ID"
    value: ""
    required:
      - key: "useCloudfrontRedirect"
        is: "true"
  - name: "PRIVATE_CLOUDFRONT_KEY_PATH"
    value: ""
    required:
      - key: "useCloudfrontRedirect"
        is: "true"
      - key: "keysStorageType"
        is: "local"
  - name: "AWSSM_CLOUDFRONT_PRIVATE_KEY_SECRET_ID"
    value: ""
    required:
      - key: "useCloudfrontRedirect"
        is: "true"
      - key: "keysStorageType"
        is: "aws-secrets-manager"
  # Per-app identity and signing keys. In single-app deployments (multiApp="false")
  # they come from these flat env vars, mirroring the v2 layout. In multi-app
  # deployments (multiApp="true") they are all inside EXPO_APPS_JSON and these
  # flat vars are NOT rendered on the pod. Each entry therefore ANDs its
  # existing mode condition with `multiApp=false`.
  - name: "KEYS_STORAGE_TYPE"
    key: "keysStorageType"
    computed: true
    required:
      - key: "multiApp"
        is: "false"
  - name: "AWSSM_EXPO_PUBLIC_KEY_SECRET_ID"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
      - key: "keysStorageType"
        is: "aws-secrets-manager"
  - name: "AWSSM_EXPO_PRIVATE_KEY_SECRET_ID"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
      - key: "keysStorageType"
        is: "aws-secrets-manager"
  - name: "PUBLIC_LOCAL_EXPO_KEY_PATH"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
      - key: "keysStorageType"
        is: "local"
  - name: "PRIVATE_LOCAL_EXPO_KEY_PATH"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
      - key: "keysStorageType"
        is: "local"
  - name: "PUBLIC_EXPO_KEY_B64"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
      - key: "keysStorageType"
        is: "environment"
  - name: "PRIVATE_EXPO_KEY_B64"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
      - key: "keysStorageType"
        is: "environment"
  # CloudFront key is a server-wide signing key — it is NOT per app — so it
  # stays required whenever CloudFront is enabled, regardless of multiApp.
  - name: "PRIVATE_CLOUDFRONT_KEY_B64"
    value: ""
    required:
      - key: "keysStorageType"
        is: "environment"
  - name: "BASE_URL"
    value: ""
    required: true
  - name: "EXPO_ACCESS_TOKEN"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
  - name: "EXPO_APP_ID"
    value: ""
    required:
      - key: "multiApp"
        is: "false"
  # Multi-app: a JSON array with per-app identity, access token and signing
  # keys. See apps/docs/docs/advanced/multi-app.mdx for the schema.
  - name: "EXPO_APPS_JSON"
    value: ""
    required:
      - key: "multiApp"
        is: "true"
  - name: "JWT_SECRET"
    value: ""
    required: true


podAnnotations: {}
    # prometheus.io/scrape: "true"
    # prometheus.io/path: "/metrics"
    # prometheus.io/port: "3000"

podSecurityContext: {}
