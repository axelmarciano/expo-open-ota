name: Promote release to latest

# Manually promotes an already-released version to the "latest" Docker tag,
# in both the mercuretechnologies and the legacy axelmarciano namespaces.
# The release workflow never touches "latest" anymore.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable release tag to promote (e.g. v3.0.0)"
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag }}
    steps:
      - name: Validate tag
        run: |
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Only stable tags (vX.Y.Z) can be promoted to latest, got: $TAG"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.DOCKER_GITHUB_CONTAINER_REGISTRY_TOKEN }}" | docker login ghcr.io -u axelmarciano --password-stdin

      - name: Tag Docker image as latest in both namespaces
        run: |
          for REPO in "ghcr.io/${{ github.repository_owner }}/expo-open-ota" "ghcr.io/axelmarciano/expo-open-ota"; do
            docker buildx imagetools create -t "$REPO:latest" "$REPO:$TAG"
          done
