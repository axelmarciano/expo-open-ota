name: Push workflow

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Check for dead code
        run: make lint

  test:
    runs-on: ubuntu-latest

    # The Postgres-backed store tests (users, SSO, progressive rollouts) cover SQL that
    # the in-memory fakes cannot reach: partial unique indexes, deferred FKs, guarded
    # UPDATEs and their behavior under concurrency. They skip themselves when
    # TEST_DATABASE_URL is unset, so without this service they never ran here and the
    # job went green having executed none of them.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eoota_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/eoota_test?sslmode=disable
      TEST_AZURE_BLOB_ENDPOINT: http://localhost:10000/devstoreaccount1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Check if .env exists or create it
        run: |
          if [ ! -f .env ]; then
            touch .env
          fi

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Install Go dependencies
        run: |
          go mod tidy 
          go mod download

      # Not a service container: services cannot override the image command,
      # and Azurite needs --skipApiVersionCheck because the Go SDK speaks API
      # versions newer than the ones Azurite validates against.
      - name: Start Azurite (Azure Blob emulator)
        run: docker run -d -p 10000:10000 mcr.microsoft.com/azure-storage/azurite azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck

      - name: Run tests
        run: make test_app html

      - name: Upload coverage artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.html
          retention-days: 1
